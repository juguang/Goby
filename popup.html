<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=320, initial-scale=1.0">
  <title>Goby 配置</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: #111827;
      background: #ffffff;
    }

    .title {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
      padding-bottom: 12px;
      margin-bottom: 16px;
      border-bottom: 1px solid #e5e7eb;
    }

    /* ---- Profile selector row ---- */
    .profile-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .profile-header .profile-label {
      font-size: 13px;
      font-weight: 600;
      color: #111827;
    }

    .profile-btn-group {
      display: flex;
      gap: 4px;
    }

    .profile-btn {
      width: 28px;
      height: 28px;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      background: #ffffff;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111827;
      padding: 0;
      transition: background 0.15s;
    }

    .profile-btn:hover {
      background: #f3f4f6;
    }

    .profile-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: #ffffff;
    }

    .profile-btn.delete-btn:hover:not(:disabled) {
      color: #ef4444;
    }

    /* ---- Profile select dropdown ---- */
    .profile-select-wrapper {
      margin-bottom: 16px;
    }

    #profile-select {
      width: 100%;
      height: 36px;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      padding: 0 8px;
      font-size: 13px;
      font-family: inherit;
      color: #111827;
      background: #ffffff;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    #profile-select:focus {
      border-color: #667eea;
    }

    /* ---- Form groups (Plan 01-01 preserved) ---- */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 4px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper input {
      width: 100%;
      height: 36px;
      padding: 8px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      color: #111827;
      background: #ffffff;
      outline: none;
      transition: border-color 0.15s, outline 0.15s;
    }

    .input-wrapper input:focus {
      border-color: #667eea;
      outline: 2px solid rgba(102, 126, 234, 0.4);
      outline-offset: -1px;
    }

    .input-wrapper input::placeholder {
      color: #6b7280;
    }

    .input-wrapper .eye-toggle {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      line-height: 1;
    }

    .input-wrapper .eye-toggle:hover {
      color: #111827;
    }

    .input-wrapper input[type="password"] {
      padding-right: 34px;
    }

    .input-wrapper input[type="text"] {
      padding-right: 34px;
    }

    /* ---- Save button ---- */
    .btn-save {
      width: 100%;
      height: 36px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #ffffff;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s;
    }

    .btn-save:hover {
      opacity: 0.85;
    }

    .btn-save:active {
      transform: scale(0.97);
    }

    .btn-save.hidden {
      display: none;
    }

    /* ---- Save status / Toast ---- */
    #saveStatus {
      display: none;
      text-align: center;
      font-size: 12px;
      margin-top: 8px;
      min-height: 18px;
      transition: opacity 0.3s ease;
    }

    #saveStatus.visible {
      display: block;
    }

    #saveStatus.success {
      color: #22c55e;
    }

    #saveStatus.error {
      color: #ef4444;
    }

    /* ---- Empty state ---- */
    .empty-state {
      display: none;
      text-align: center;
      padding: 24px 16px;
    }

    .empty-state.visible {
      display: block;
    }

    .empty-state .empty-icon {
      font-size: 48px;
      opacity: 0.4;
      margin-bottom: 12px;
    }

    .empty-state .empty-title {
      font-size: 13px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 4px;
    }

    .empty-state .empty-body {
      font-size: 12px;
      font-weight: 400;
      color: #6b7280;
      line-height: 1.5;
    }

    .form-section.hidden {
      display: none;
    }

    .bottom-spacer {
      padding-bottom: 24px;
    }

    /* ---- Panel toggle switch ---- */
    .panel-toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-top: 1px solid #e5e7eb;
      margin-top: 16px;
    }

    .panel-toggle-row .panel-toggle-label {
      font-size: 13px;
      color: #111827;
    }

    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .toggle-switch input {
      display: none;
    }

    .toggle-slider {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #d1d5db;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 2px;
      top: 2px;
      background: #ffffff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle-switch input:checked + .toggle-slider {
      background: #667eea;
    }

    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(18px);
    }
  </style>
</head>
<body>
  <div class="title">Goby — AI 浏览器助手</div>

  <!-- Profile selector row -->
  <div class="profile-header">
    <span class="profile-label">API 配置</span>
    <div class="profile-btn-group">
      <button type="button" class="profile-btn" id="btn-add-profile" title="添加配置">&#xFF0B;</button>
      <button type="button" class="profile-btn" id="btn-edit-profile" title="编辑配置" disabled>&#x270E;</button>
      <button type="button" class="profile-btn delete-btn" id="btn-delete-profile" title="删除配置" disabled>&#x2715;</button>
    </div>
  </div>

  <!-- Profile select dropdown -->
  <div class="profile-select-wrapper">
    <select id="profile-select">
      <option disabled>暂无配置</option>
    </select>
  </div>

  <!-- Empty state -->
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">&#x1F41F;</div>
    <div class="empty-title">暂无 API 配置</div>
    <div class="empty-body">点击右上角 + 按钮添加你的第一个 API 配置</div>
  </div>

  <!-- Form section (shown when at least one profile exists) -->
  <div class="form-section" id="formSection">
    <div class="form-group">
      <label for="baseUrl">API Base URL</label>
      <div class="input-wrapper">
        <input type="text" id="baseUrl" placeholder="http://127.0.0.1:8765/v1" autocomplete="off">
      </div>
    </div>

    <div class="form-group">
      <label for="apiKey">API Key</label>
      <div class="input-wrapper">
        <input type="password" id="apiKey" placeholder="" autocomplete="off">
        <button class="eye-toggle" id="eyeToggle" type="button" title="显示/隐藏 API Key">&#x1F441;</button>
      </div>
    </div>

    <div class="form-group">
      <label for="model">Model Name</label>
      <div class="input-wrapper">
        <input type="text" id="model" placeholder="例如: Qwen3.6-35B-A3B" autocomplete="off">
      </div>
    </div>

    <button type="button" class="btn-save" id="saveBtn">保存配置</button>
  </div>

  <!-- Panel toggle row (POPUP-03) -->
  <div class="panel-toggle-row">
    <span class="panel-toggle-label">Goby 面板</span>
    <label class="toggle-switch">
      <input type="checkbox" id="panelToggle">
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div id="saveStatus" class="bottom-spacer"></div>

  <script src="storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
