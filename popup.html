<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=320, initial-scale=1.0">
  <title>Goby 配置</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: #111827;
      background: #ffffff;
    }

    .title {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
      padding-bottom: 12px;
      margin-bottom: 16px;
      border-bottom: 1px solid #e5e7eb;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 4px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper input {
      width: 100%;
      height: 36px;
      padding: 8px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      color: #111827;
      background: #ffffff;
      outline: none;
      transition: border-color 0.15s, outline 0.15s;
    }

    .input-wrapper input:focus {
      border-color: #667eea;
      outline: 2px solid rgba(102, 126, 234, 0.4);
      outline-offset: -1px;
    }

    .input-wrapper input::placeholder {
      color: #6b7280;
    }

    .input-wrapper .eye-toggle {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      line-height: 1;
    }

    .input-wrapper .eye-toggle:hover {
      color: #111827;
    }

    .input-wrapper input[type="password"] {
      padding-right: 34px;
    }

    .input-wrapper input[type="text"] {
      padding-right: 34px;
    }

    .btn-save {
      width: 100%;
      height: 36px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #ffffff;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s;
    }

    .btn-save:hover {
      opacity: 0.85;
    }

    .btn-save:active {
      transform: scale(0.97);
    }

    #saveStatus {
      display: none;
      text-align: center;
      font-size: 12px;
      margin-top: 8px;
      min-height: 18px;
      transition: opacity 0.3s ease;
    }

    #saveStatus.visible {
      display: block;
    }

    #saveStatus.success {
      color: #22c55e;
    }

    #saveStatus.error {
      color: #ef4444;
    }

    .bottom-spacer {
      padding-bottom: 24px;
    }
  </style>
</head>
<body>
  <div class="title">Goby — AI 浏览器助手</div>

  <div class="form-group">
    <label for="baseUrl">API Base URL</label>
    <div class="input-wrapper">
      <input type="text" id="baseUrl" placeholder="http://127.0.0.1:8765/v1" autocomplete="off">
    </div>
  </div>

  <div class="form-group">
    <label for="apiKey">API Key</label>
    <div class="input-wrapper">
      <input type="password" id="apiKey" placeholder="" autocomplete="off">
      <button class="eye-toggle" id="eyeToggle" type="button" title="显示/隐藏 API Key">&#x1F441;</button>
    </div>
  </div>

  <div class="form-group">
    <label for="model">Model Name</label>
    <div class="input-wrapper">
      <input type="text" id="model" placeholder="例如: Qwen3.6-35B-A3B" autocomplete="off">
    </div>
  </div>

  <button class="btn-save" id="saveBtn">保存配置</button>

  <div id="saveStatus" class="bottom-spacer"></div>

  <script src="storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
